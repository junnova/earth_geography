<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + Vue</title>
  </head>
  <body style="margin:0;background:#000">
    <div id="app">
      <!-- 预加载画面：Vue 挂载后自动替换 -->
      <div style="width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a0e27,#000)">
        <div style="text-align:center">
          <div style="width:48px;height:48px;border:3px solid rgba(168,216,234,.2);border-top-color:rgba(168,216,234,.8);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px"></div>
          <div style="color:#a8d8ea;font-size:16px;letter-spacing:2px;font-family:sans-serif">正在加载地球...</div>
        </div>
      </div>
      <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
